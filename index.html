<!--
8BITBOD
Version: v3.9
Date: 2026-07-09

Changelog:
- v3.12: Healing Pool now asks Yes/No; choosing No leaves it unused for a later visit.
- Rebuilt around board-game style decks: 40 dungeon tiles, 29 monsters, full item list.
- Added parchment UI and mobile-friendly layout.
- Added drag-to-pan map, zoom controls, and centre-on-hero.
- Added tile draw / rotate / place flow with valid connections.
- Added visible inventory grouped as Equipment, Spells, Consumables, and Other.
- Added combat screen with hero and monster current health.
- Fixed Run Away during combat: always available, costs 1 HP, returns to previous tile.
- Added hidden monster marker until the hero enters the tile.
- Added first pass of item usage: Bow, Elven Bow, Ice Staff, potions, armour, weapons, boots, Bear, Dragonlance, spells, cloak, chests and insurance.
- Board game is the master: item effects are provisional where the solo digital version needs adaptation.
- v2.8: Fixed uploaded PNG tile rotation in placement preview and on the map.
- v2.9: Combat log now resets to “Ready to fight!” whenever a new monster encounter begins.
-->
<style>
:root{
  --cream:#eadbb6; --cream2:#f6e8bd; --ink:#000000; --dark:#000000; --red:#b5201a;
  --gold:#000000; --green:#000000; --blue:#000000; --panel:#f2e4bf; --shadow:#000000;
  --tile:128px; --gap:0px;
}
*{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
html,body{margin:0;height:100%;font-family:Georgia,serif;background:#000;color:var(--ink);overflow:hidden;}
button{font-family:Georgia,serif;font-weight:bold;border:3px solid var(--ink);background:var(--cream);color:var(--ink);padding:10px 12px;border-radius:6px;box-shadow:2px 2px 0 var(--shadow);cursor:pointer;}
button:hover:not(:disabled){background:#fff1c9;}
button:disabled{opacity:.45;cursor:not-allowed;}
.small{font-size:12px;opacity:.85}.titlefont{font-family:Georgia,serif;font-weight:bold;letter-spacing:.5px}
#app{height:100%;display:grid;grid-template-columns:310px 1fr;grid-template-rows:1fr;background:#000}
#side{background:var(--panel);border-right:5px solid var(--ink);padding:10px;overflow:auto;display:flex;flex-direction:column;gap:8px;}
.logo{font-size:22px;text-align:center;border:4px solid var(--ink);background:var(--cream);padding:8px;box-shadow:3px 3px 0 var(--shadow)}
.version{text-align:center;font-size:13px;margin-top:3px}.box{background:var(--cream);border:3px solid var(--ink);padding:8px;box-shadow:2px 2px 0 var(--shadow)}
.row{display:flex;justify-content:space-between;gap:8px;align-items:center;margin:3px 0}.hp{color:var(--red);font-weight:bold}.ap{color:var(--blue);font-weight:bold}
.hearts{letter-spacing:1px;color:var(--red);font-size:20px;line-height:1.1}.statline{font-size:16px}.sectionTitle{font-weight:bold;border-bottom:2px solid var(--ink);margin:6px 0 5px}
#inventory .invgrid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:7px}.itemBtn{width:44px;height:44px;display:flex;align-items:center;justify-content:center;font-size:25px;padding:0;background:#f7e9c1;position:relative}.itemBtn .count{position:absolute;right:2px;bottom:0;font-size:12px;background:var(--ink);color:#fff;padding:0 3px;border-radius:4px}.itemBtn.active{outline:3px solid var(--ink)}.itemBtn.equipped{outline:4px solid var(--red)}.itemBtn .equipMark{position:absolute;left:1px;top:0;font-size:13px;background:var(--red);color:#fff;padding:0 3px;border-radius:3px}.dropMark{position:absolute;left:2px;bottom:0;font-size:14px;background:#fff6d8;border:2px solid var(--ink);z-index:4;padding:0 3px}
#log{min-height:120px;max-height:210px;overflow:auto;font-size:15px;line-height:1.25}
#killTally{font-size:14px}.killGrid{display:grid;grid-template-columns:1fr auto;gap:3px 8px}.killTotal{font-weight:bold;margin-top:5px;border-top:2px solid var(--ink);padding-top:4px}.logline{border-bottom:1px dotted #000;padding:3px 0}.loot{color:#000}.combat{color:#922}.system{color:#000}.heal{color:#000}
#main{position:relative;overflow:hidden;background:#000;touch-action:none;}
#topbar{position:absolute;left:10px;right:10px;top:10px;z-index:20;display:flex;gap:8px;align-items:center;justify-content:space-between;pointer-events:none}
#topbar .cluster{display:flex;gap:8px;pointer-events:auto;flex-wrap:wrap}.badge{background:var(--cream);border:3px solid var(--ink);padding:8px 10px;box-shadow:2px 2px 0 var(--shadow);font-weight:bold}
#viewport{position:absolute;inset:0;overflow:hidden;cursor:grab;touch-action:none}#viewport.dragging{cursor:grabbing}
#world{position:absolute;left:0;top:0;transform-origin:0 0;}#world.cameraSmooth{transition:transform .28s ease-out;}
.tile{position:absolute;width:var(--tile);height:var(--tile);background:var(--cream);border:2px solid var(--ink);box-shadow:none;display:flex;align-items:center;justify-content:center;}
.tile svg{position:absolute;inset:0;width:100%;height:100%}.tileAsset{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;image-rendering:pixelated;transform-origin:50% 50%;display:block}.tile .mark{position:absolute;font-size:40px;text-shadow:1px 1px #fff;z-index:3}.tile .tiny{position:absolute;right:4px;top:2px;font-size:20px;z-index:4}.hero{position:absolute;width:62px;height:62px;border:3px solid var(--ink);background:var(--gold);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:36px;z-index:15;box-shadow:2px 2px 0 rgba(0,0,0,.5);transition:left .18s,top .18s}
.hiddenMonster{font-size:44px;color:var(--red);font-weight:bold;text-shadow:2px 2px 0 #000;z-index:5}.monsterGlyph{font-size:44px;z-index:5}
.mNumber{position:absolute;left:5px;top:4px;z-index:8;font-weight:bold;font-size:16px;background:rgba(246,232,189,.92);border:2px solid var(--ink);padding:2px 4px;line-height:1}.ringMark{position:absolute;right:5px;bottom:4px;z-index:9;font-size:34px;filter:drop-shadow(1px 1px 0 #fff)}
#controls{position:absolute;bottom:10px;left:10px;right:10px;display:flex;flex-wrap:wrap;gap:8px;z-index:30;justify-content:center;pointer-events:auto}.red{background:#f7d2c9}.green,.blue,.gold{background:var(--cream)}
#placement,#modal,#combat{position:fixed;inset:0;background:rgba(0,0,0,.62);z-index:100;display:none;align-items:center;justify-content:center;padding:16px}#placement.open,#modal.open,#combat.open{display:flex}
.card{background:var(--panel);border:5px solid var(--ink);box-shadow:6px 6px 0 #000;max-width:520px;width:100%;padding:14px;text-align:center}.card h2{margin:4px 0 10px;font-size:24px}.preview{width:110px;height:110px;margin:8px auto;position:relative;background:var(--cream);border:4px solid var(--ink)}.preview svg,.preview .tileAsset{width:100%;height:100%}.btnrow{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:10px}.desc{font-size:18px;line-height:1.2;white-space:pre-line}.combatGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:10px 0}.fighter{border:3px solid var(--ink);background:var(--cream);padding:8px;min-height:126px}.bigGlyph{font-size:42px}.combatLog{min-height:44px;border:2px dashed var(--shadow);padding:6px;background:#fff4cf;margin:8px 0;font-size:17px}
.diceTray{min-height:58px;border:3px solid var(--ink);background:#fff6d8;margin:8px 0;padding:6px;display:flex;gap:10px;justify-content:center;align-items:center;flex-wrap:wrap}.diceGroup{display:flex;gap:4px;align-items:center}.diceLabel{font-weight:bold;margin-right:4px}.die{width:34px;height:34px;border:3px solid var(--ink);background:#fff;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:20px;box-shadow:2px 2px 0 #000}.rolling .die{animation:diceWobble .12s steps(2,end) infinite}@keyframes diceWobble{0%{transform:translate(0,0) rotate(0deg)}50%{transform:translate(1px,-1px) rotate(4deg)}100%{transform:translate(-1px,1px) rotate(-4deg)}}
#toast{position:fixed;left:50%;top:20%;transform:translateX(-50%);background:var(--cream);border:4px solid var(--ink);box-shadow:4px 4px 0 #000;padding:12px 18px;font-size:22px;font-weight:bold;z-index:200;display:none}
#devPanel{position:fixed;right:12px;bottom:12px;width:280px;max-height:55vh;overflow:auto;background:#fff6d8;border:4px solid var(--ink);box-shadow:4px 4px 0 #000;z-index:250;padding:10px;font-size:14px;display:none;white-space:pre-line}
#devPanel.open{display:block}

#charSelect{position:fixed;inset:0;z-index:500;background:var(--cream);color:var(--ink);display:flex;flex-direction:column;align-items:center;gap:12px;padding:18px;overflow:auto;border:12px solid var(--ink)}
#charSelect.hidden{display:none}
#charSelect h1{margin:4px 0 0;font-size:34px;text-align:center;letter-spacing:1px}
#charSelect .intro{max-width:760px;text-align:center;font-size:18px;line-height:1.25;border:3px solid var(--ink);padding:10px;background:#fff6d8}
#charGrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:10px;width:min(980px,100%)}
.charCard{background:#fff6d8;border:4px solid var(--ink);box-shadow:4px 4px 0 #000;padding:10px;cursor:pointer;text-align:left}
.charCard:hover{transform:translate(-1px,-1px);box-shadow:5px 5px 0 #000}.charCard h3{margin:0 0 6px;font-size:19px}.charStats{font-weight:bold;margin:6px 0}.charSpecial{border-top:2px solid var(--ink);padding-top:6px;font-size:16px}.charGlyph{font-size:34px;float:right}


.assetRow{display:grid;grid-template-columns:54px 1fr auto auto;gap:8px;align-items:center;border-bottom:1px dotted var(--ink);padding:7px 0;text-align:left}
.assetThumb{width:44px;height:44px;border:2px solid var(--ink);background:#fff6d8;display:flex;align-items:center;justify-content:center;font-size:24px;overflow:hidden}
.assetThumb img,.spriteIcon{max-width:100%;max-height:100%;object-fit:contain;image-rendering:pixelated}
.spriteIcon{width:1.25em;height:1.25em;vertical-align:-.18em}.spriteWrap{display:inline-flex;align-items:center;justify-content:center}
.assetList{max-height:60vh;overflow:auto;padding:4px;text-align:left}
.assetTools{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:8px 0}
.hiddenFile{display:none}


.slotGrid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:6px 0}.equipSlot,.backpackSlot{min-height:54px;border:2px solid var(--ink);background:#fff6d8;padding:5px;text-align:center;position:relative}.equipSlot.wide{grid-column:1/3}.slotLabel{display:block;font-size:11px;font-weight:bold;text-transform:uppercase;border-bottom:1px solid #000;margin-bottom:3px}.slotItem{font-size:14px;line-height:1.05;cursor:pointer}.slotEmpty{font-size:13px;opacity:.55;padding-top:8px}.backpackGrid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}.backpackSlot{min-width:0}.twoHandedBadge{font-size:10px;background:#000;color:#fff;padding:1px 3px}.peekBtn{font-size:12px;padding:5px 7px;margin:2px}.inventoryWarning{font-weight:bold;color:var(--red);margin:4px 0}

.soundRow{display:grid;grid-template-columns:1fr auto auto auto;gap:7px;align-items:center;border-bottom:1px dotted var(--ink);padding:7px 0;text-align:left}.soundRow button{padding:6px 8px}.soundList{max-height:58vh;overflow:auto;padding:4px}.soundStatus{font-size:12px;opacity:.75}.volumeRow{display:grid;grid-template-columns:90px 1fr 42px;gap:8px;align-items:center;margin:8px 0}.volumeRow input{width:100%}
@media(max-width:800px){#app{grid-template-columns:1fr;grid-template-rows:1fr 240px}#side{grid-row:2;border-right:none;border-top:5px solid var(--ink);display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:8px}.logo{display:none}#log{max-height:105px;min-height:80px}.box{padding:6px}.sectionTitle{margin:3px 0}.itemBtn{width:38px;height:38px;font-size:21px}#inventory{grid-column:1/3}#topbar{font-size:13px}.badge{padding:6px}.tile{--tile:128px}.combatGrid{grid-template-columns:1fr}.card{max-height:90vh;overflow:auto}}
</style>
<!--
8BITBOD
Version: v3.10
Changes:
- v3.2: fixed tile spacing, removed floor asset defaults, red M markers for unrevealed monsters.
- v3.3: kept item/combat behaviour from v3.1 and made Ice Staff, Bow, Bear, Dragonlance usable in combat.
- v3.4: added discard piles and developer state panel.
- v3.5: added save/load buttons and end-game statistics.
- v3.9: 8 item inventory limit, player-chosen equip/use/drop, dropped items remain on tiles.
- v3.10: fixed Bow timing, clarified monster HP display, and confirmed only players can score critical hits.
- v4.3: Bow prompts on every entry to a monster tile. Elven Bow deals 1d6+2. A surviving monster charges, forcing one melee round before escape.
- v3.11: rules accuracy pass: item rewards now use starting monster health (5 = 0, 6–9 = 1, 10+ = 2); surviving monsters heal to full when the turn ends; bow remains an opening ranged attack before melee.
- User PNG uploads still override floor tiles and icons.
-->
<!-- v4.4: fixed the adventurer position so the hero is centred within every 128px floor tile. -->
<!-- v5.0: Restored the board-game M2-M12 system. All eleven M tiles are always in the 38-tile dungeon stack; monsters are still randomly drawn from the monster bag. When the last dungeon tile is laid, the Exit and Dragon appear, two dice locate the Ring on M2-M12, and the Ring remains on that floor tile until collected. -->
</head>
<body>

<div id="charSelect">
  <h1>8BITBOD</h1>
  <div class="intro">Choose your adventurer before entering the dungeon.</div>
  <div id="charGrid"></div>
  <div class="small">v5.0</div>
</div>

<div id="app">
  <aside id="side">
    <div><div class="logo">8BITBOD</div><div class="version">Bag of Dungeon © Gunpowder Studios</div></div>
    <div class="box" id="stats"></div>
    <div class="box" id="inventory"></div>
    <div class="box" id="killTally"></div><div class="box"><div class="sectionTitle">Quest Log</div><div id="log"></div></div>
  </aside>
  <main id="main">
    <div id="topbar">
      <div class="cluster"><span class="badge" id="deckBadge">Tiles</span><span class="badge" id="monsterBadge">Monsters</span><span class="badge" id="itemBadge">Items</span></div>
      <div class="cluster"><button id="zoomOut">−</button><button id="centreBtn">Centre</button><button id="zoomIn">+</button><button id="menuBtn">☰ Menu</button></div>
    </div>
    <div id="viewport"><div id="world"></div></div>
    <div id="controls"></div>
  </main>
</div>

<div id="placement"><div class="card"><h2>Place Dungeon Tile</h2><div id="placeInfo" class="desc"></div><div class="preview" id="tilePreview"></div><div class="btnrow"><button id="rotBtn">Rotate 90°</button><button id="placeBtn" class="green">Place</button><button id="cancelPlace" class="red">Cancel</button></div><div class="small">Tile must connect back to your current tile.</div></div></div>
<div id="modal"><div class="card"><h2 id="modalTitle">Item</h2><div id="modalBody" class="desc"></div><div id="modalButtons" class="btnrow"></div></div></div>
<div id="combat"><div class="card"><h2 id="combatTitle">Combat</h2><div class="combatGrid"><div class="fighter"><div class="bigGlyph" id="heroGlyph">🧑</div><b>Hero</b><div id="heroCombatStats"></div></div><div class="fighter"><div class="bigGlyph" id="monsterGlyph">👹</div><b id="monsterName">Monster</b><div id="monsterCombatStats"></div></div></div><div class="diceTray" id="diceTray">Dice will appear here.</div><div class="combatLog" id="combatLog">A monster blocks your path.</div><div id="combatBtns" class="btnrow"></div></div></div>
<div id="toast"></div>
<div id="devPanel"></div>

<script src="assets/assets.js"></script>
<script>
const VERSION='v5.0';

const CHARACTERS=[
 {id:'sirrus',name:'Sirrus the Fighter',glyph:'⚔',desc:'Skilled warrior and renowned blade-master.',maxHealth:10,maxAp:5,baseDice:2,baseMod:2,special:'Lethal Blow',specialDesc:'Once per game you may double your combat roll result.'},
 {id:'tamara',name:'Tamara the Fighter',glyph:'⚔',desc:'Fearless sword fighter.',maxHealth:10,maxAp:5,baseDice:2,baseMod:2,special:'Lethal Blow',specialDesc:'Once per game you may double your combat roll result.'},
 {id:'duric',name:'Duric the Dwarf',glyph:'🪓',desc:'Former head of the King\'s Guard.',maxHealth:12,maxAp:4,baseDice:2,baseMod:3,special:'Brace',specialDesc:'Once per game block an attack and take no damage.'},
 {id:'marria',name:'Marria the Dwarf',glyph:'🪓',desc:'Stout-hearted and legendary with an axe.',maxHealth:12,maxAp:4,baseDice:2,baseMod:3,special:'Brace',specialDesc:'Once per game block an attack and take no damage.'},
 {id:'rill',name:'Rill the Healer',glyph:'✋',desc:'Wise in the lore of medicine.',maxHealth:9,maxAp:5,baseDice:2,baseMod:0,special:'Renew',specialDesc:'Spend 3 AP to heal 2 dice of health. Three uses per game.'},
 {id:'tarak',name:'Tarak the Healer',glyph:'✋',desc:'A healer of wounds and woes.',maxHealth:9,maxAp:5,baseDice:2,baseMod:0,special:'Renew',specialDesc:'Spend 3 AP to heal 2 dice of health. Three uses per game.'},
 {id:'alendra',name:'Alendra the Elf',glyph:'🏹',desc:'Fleet-footed and keen-eyed.',maxHealth:9,maxAp:6,baseDice:2,baseMod:1,special:'Dead-eye',specialDesc:'Natural 6 in combat gives an instant kill.'},
 {id:'galhorn',name:'Galhorn the Elf',glyph:'🏹',desc:'Master archer, quick and sharp.',maxHealth:9,maxAp:6,baseDice:2,baseMod:1,special:'Dead-eye',specialDesc:'Natural 6 in combat gives an instant kill.'}
];
function renderCharSelect(){const grid=document.getElementById('charGrid');grid.innerHTML='';CHARACTERS.forEach(c=>{const card=document.createElement('div');card.className='charCard';card.innerHTML=`<div class="charGlyph">${iconHTML(c.name,c.glyph)}</div><h3>${c.name}</h3><div>${c.desc}</div><div class="charStats">Health ${c.maxHealth} · AP ${c.maxAp} · Combat ${c.baseDice}d6+${c.baseMod}</div><div class="charSpecial"><b>${c.special}</b><br>${c.specialDesc}</div>`;card.onclick=()=>startGame(c);grid.appendChild(card);});}
function startGame(c){audio();document.getElementById('charSelect').classList.add('hidden');newGame(c);}
function showCharSelect(){closeModal();closeCombat();document.getElementById('charSelect').classList.remove('hidden');renderCharSelect();}

const TILE=128,GAP=0,STEP=TILE+GAP;
const DIRS={N:{dx:0,dy:-1,opp:'S'},E:{dx:1,dy:0,opp:'W'},S:{dx:0,dy:1,opp:'N'},W:{dx:-1,dy:0,opp:'E'}};

const TILE_BASE={straight:{N:1,S:1,E:0,W:0},corner:{N:1,E:1,S:0,W:0},t:{N:1,E:1,W:1,S:0},cross:{N:1,E:1,S:1,W:1},spike:{N:1,S:1,E:0,W:0},pool:{N:1,E:1,S:1,W:1},exit:{N:1,E:1,S:1,W:1},start:{N:1,E:1,S:1,W:1}};
const TILE_LABEL={straight:'Straight',corner:'Corner',t:'T-Junction',cross:'Crossroad',spike:'Spike Trap',pool:'Healing Pool',exit:'Exit'};
const TILE_GLYPH={spike:'▲',pool:'💧',exit:'🚪',start:'🏁'};
const MONSTER_MASTER=[
 {name:'Goblin',copies:5,dice:1,mod:1,maxHealth:5,glyph:'👺'}, {name:'Zombie',copies:4,dice:1,mod:2,maxHealth:6,glyph:'☠'},
 {name:'Mummy',copies:2,dice:1,mod:4,maxHealth:7,glyph:'▣'}, {name:'Monk',copies:3,dice:2,mod:4,maxHealth:8,glyph:'♟'},
 {name:'Mud Monster',copies:2,dice:2,mod:2,maxHealth:9,glyph:'♨'}, {name:'Werewolf',copies:2,dice:2,mod:3,maxHealth:10,glyph:'♞'},
 {name:'Troll',copies:3,dice:2,mod:4,maxHealth:10,glyph:'♜'}, {name:'Minotaur',copies:1,dice:2,mod:5,maxHealth:11,glyph:'♉'},
 {name:'Skeleton',copies:2,dice:2,mod:1,maxHealth:12,glyph:'☠'}, {name:'Giant Snake',copies:2,dice:2,mod:6,maxHealth:13,glyph:'🐍'},
 {name:'Reacher',copies:1,dice:2,mod:7,maxHealth:15,glyph:'☣',special:'Sting range 4. Half damage to all.'},
 {name:'Mirror Monster',copies:2,dice:0,mod:0,maxHealth:0,glyph:'◈',special:'Mirrors your current Health & Combat.'}
];
const ITEM_MASTER=[
 {name:'Rusty Armour',copies:1,type:'equipment',slot:'armour',icon:'▤',desc:'-1 damage from attacks.',apply:p=>equipBest('armour',1,'Rusty Armour','▤')},
 {name:'Steel Armour',copies:1,type:'equipment',slot:'armour',icon:'▥',desc:'-1 damage from attacks.',apply:p=>equipBest('armour',1,'Steel Armour','▥')},
 {name:'Magic Armour',copies:1,type:'equipment',slot:'armour',icon:'▦',desc:'-2 damage from attacks.',apply:p=>equipBest('armour',2,'Magic Armour','▦')},
 {name:'Magic Boots',copies:2,type:'equipment',slot:'boots',icon:'👢',desc:'+1 AP each turn.',apply:p=>{if(!p.equipment.boots){p.maxAp+=1;p.ap+=1;}p.equipment.boots={name:'Magic Boots',icon:'👢',value:1};}},
 {name:'Teleport Crystal',copies:1,type:'spell',icon:'◆',desc:'1 use: teleport to any revealed tile.',use:'teleport'},
 {name:'Acme Insurance',copies:1,type:'other',icon:'☂',desc:'Used automatically on defeat: keep items and revive once.',apply:p=>{p.flags.insurance=true;p.other.push({name:'Acme Insurance',icon:'☂',desc:'Auto revive / keep items.'});}},
 {name:"Imp's Teeth",copies:1,type:'consumable',icon:'☷',desc:'1 use: reroll your next combat roll.',use:'reroll'},
 {name:'Torch',copies:1,type:'equipment',slot:'tool',icon:'🔥',desc:'Lay 2 dungeon tiles for 1 AP.',apply:p=>{p.equipment.torch={name:'Torch',icon:'🔥',value:1};}},
 {name:'Flying Daggers',copies:1,type:'spell',icon:'✣',desc:'1 use: 2 dice damage to a monster.',use:'daggers'},
 {name:'Steel Sword',copies:1,type:'equipment',slot:'weapon',icon:'⚔',desc:'+1 combat roll.',apply:p=>equipBest('weapon',1,'Steel Sword','⚔')},
 {name:"Sorcerer's Skull",copies:1,type:'spell',icon:'☠',desc:'1 use: 1 dice damage to all on tile.',use:'skull'},
 {name:'Magic Sword',copies:1,type:'equipment',slot:'weapon',icon:'🗡',desc:'+2 combat roll. View adjacent monster.',apply:p=>equipBest('weapon',2,'Magic Sword','🗡')},

function createTileDeck(){
  // Rules v3.1: Start face up and Exit set aside. The other 38 floor tiles form the shuffled dungeon stack.
  let deck=[...Array(15)].map(()=>({kind:'straight'})).concat([...Array(14)].map(()=>({kind:'corner'})),[...Array(2)].map(()=>({kind:'t'})),[...Array(5)].map(()=>({kind:'cross'})),[{kind:'spike'},{kind:'pool'}]);
  deck=shuffle(deck);
  // Exactly eleven floor tiles are numbered M2-M12. They are always laid in every game. Each is also a monster location, but the monster drawn there is random.
  const normal=deck.filter(x=>!['spike','pool'].includes(x.kind));
  shuffle(normal).slice(0,11).forEach((t,i)=>{t.monsterMarker=true;t.mNumber=i+2;});
  shuffle(normal.filter(t=>!t.monsterMarker)).slice(0,2).forEach(t=>{t.itemTile=true;});
  return shuffle(deck);
}

function addToInventory(item,tile=getTile(state.player.x,state.player.y)){if(!item)return false;if(isBear(item)){state.player.companionBear=item;syncEquipment();sndItem();log('Loyal Bear joins you and uses no inventory space.','loot');render();return true;}pendingItemQueue.push({item,tile});if(pendingItemQueue.length===1)processPendingItem();return true;}
function processPendingItem(){if(!pendingItemQueue.length)return;const {item,tile}=pendingItemQueue[0];const p=state.player;const buttons=[];if(isArmour(item)&&!p.slots.armour)buttons.push({text:'Wear Armour',cls:'green',fn:()=>finishPlaceNew(item,()=>equipToSlot(item,'armour'))});if(isBoots(item)&&!p.slots.boots)buttons.push({text:'Wear Boots',cls:'green',fn:()=>finishPlaceNew(item,()=>equipToSlot(item,'boots'))});if(isHandItem(item)){if(!p.slots.left)buttons.push({text:isTwoHanded(item)?'Equip Both Hands':'Equip Left Hand',cls:'green',fn:()=>finishPlaceNew(item,()=>equipToSlot(item,'left'))});if(!isTwoHanded(item)&&!p.slots.right)buttons.push({text:'Equip Right Hand',cls:'green',fn:()=>finishPlaceNew(item,()=>equipToSlot(item,'right'))});}
 if(p.backpack.length<BACKPACK_LIMIT)buttons.push({text:'Put in Backpack',fn:()=>finishPlaceNew(item,()=>{p.backpack.push(item);syncEquipment();return true;})});buttons.push({text:'Leave on Tile',cls:'red',fn:()=>finishPlaceNew(item,()=>{tile.droppedItems=tile.droppedItems||[];tile.droppedItems.push(item);return true;})});showModal('You found '+item.name,(item.desc||'Choose where to place this item.')+'\n\nInventory spaces used: '+occupiedSpaceCount()+'/8',buttons);}
function finishPlaceNew(item,fn){const ok=fn();if(ok===false)return;closeModal();sndItem();log('Placed '+item.name+'.','loot');pendingItemQueue.shift();render();setTimeout(processPendingItem,30);}
function dropItemObject(item){const p=state.player;if(item.name==='Magic Boots'&&p.flags.bootsBonus){p.flags.bootsBonus=false;p.maxAp=Math.max(1,p.maxAp-1);p.ap=Math.min(p.ap,p.maxAp);}if(p.companionBear===item)p.companionBear=null;removeFromCurrentLocation(item);const t=getTile(p.x,p.y);t.droppedItems=t.droppedItems||[];t.droppedItems.push(item);syncEquipment();playSound('drop');log('Dropped '+item.name+' on this tile.','system');closeModal();render();}
function dropItem(idx){const item=allCarriedItems()[idx];if(item)dropItemObject(item);}
function pickupDropped(idx){const t=getTile(state.player.x,state.player.y);if(!t||!t.droppedItems||!t.droppedItems[idx])return;const item=t.droppedItems.splice(idx,1)[0];if(!t.droppedItems.length)delete t.droppedItems;addToInventory(item,t);closeModal();render();}
function key(x,y){return `${x},${y}`;}
function getTile(x,y){return state.tiles[key(x,y)]}
function openings(kind,rot=0){let base={...TILE_BASE[kind]},cur=base;for(let i=0;i<rot;i++){cur={N:cur.W,E:cur.N,S:cur.E,W:cur.S};}return cur}
function roll(n){let t=0,r=[];for(let i=0;i<n;i++){const v=1+Math.floor(Math.random()*6);r.push(v);t+=v;}return {total:t,rolls:r}}
function applyEquipmentStats(item){
 if(!item)return 0;
 if(typeof item.value==='number')return item.value;
 const values={
  'Rusty Armour':1,'Steel Armour':1,'Magic Armour':2,
  'Steel Shield':1,'Magic Shield':2,
  'Steel Sword':1,'Magic Sword':2,'Small Axe':1,'Iron Axe':2,
  'Large Steel Axe':3,'Morning Star':2
 };
 return values[item.name]||0;
}
function pCombatMod(){const e=state.player.equipment;return state.player.baseMod+applyEquipmentStats(e.weapon)}
function pDamageReduction(){const e=state.player.equipment;return applyEquipmentStats(e.armour)+applyEquipmentStats(e.shield)}
function pDice(){return state.player.baseDice+(state.player.equipment.bear?1:0)+(state.player.temp.strength?1:0)}
function drawMonster(){let m=state.monsterDeck.pop();if(!m)return null;if(m.name==='Mirror Monster'){m.maxHealth=state.player.health;m.health=state.player.health;m.dice=pDice();m.mod=pCombatMod();} else m.health=m.maxHealth; m.revealed=false; return m;}
function drawItem(){const it=state.itemDeck.pop();if(!it)return null;return {...it};}
function awardItem(item=drawItem()){if(!item)return log('No items left in the item deck.','system');log('Found '+item.name+'.','loot');addToInventory(item,getTile(state.player.x,state.player.y));}
function maybePopulate(tile){ if(tile.monsterMarker) tile.monsterPending=true; if(tile.itemTile) tile.itemPending=true; }
function startPlace(dir){if(state.player.ap<1)return;const raw=state.tileDeck.pop();if(!raw){log('No dungeon tiles left.','system');return;}placement={dir,kind:raw.kind,rot:0,raw};showPlacement();}
function showPlacement(){const need=DIRS[placement.dir].opp;document.getElementById('placeInfo').textContent='Drawn: '+TILE_LABEL[placement.kind]+' — placing to the '+placement.dir+'.';document.getElementById('tilePreview').innerHTML=tileSVG({kind:placement.kind,rot:placement.rot,opens:openings(placement.kind,placement.rot)});document.getElementById('placeBtn').disabled=!openings(placement.kind,placement.rot)[need];document.getElementById('placement').classList.add('open');}
document.getElementById('rotBtn').onclick=()=>{placement.rot=(placement.rot+1)%4;showPlacement();};
document.getElementById('cancelPlace').onclick=()=>{if(placement){state.tileDeck.push(placement.raw);shuffle(state.tileDeck);}placement=null;document.getElementById('placement').classList.remove('open');render();setTimeout(()=>centreOnHero(),0);};
document.getElementById('placeBtn').onclick=()=>{const p=state.player,d=DIRS[placement.dir],nx=p.x+d.dx,ny=p.y+d.dy;const tile={kind:placement.kind,rot:placement.rot,opens:openings(placement.kind,placement.rot),visited:false,monsterMarker:placement.raw.monsterMarker,mNumber:placement.raw.mNumber||null,itemTile:placement.raw.itemTile};maybePopulate(tile);state.tiles[key(nx,ny)]=tile;p.ap-=1;sndTile();log('Placed '+TILE_LABEL[tile.kind]+(tile.itemTile?' Item tile':'')+' to the '+placement.dir+'.','system');if(state.tileDeck.length===0&&!state.exitPlaced)placeExitAndRing(nx,ny,tile);placement=null;document.getElementById('placement').classList.remove('open');render();setTimeout(()=>centreOnHero(),0);};
function placeExitAndRing(x,y,fromTile){
 state.exitPlaced=true;
 let exitKey=null, placed=false;
 for(const dir of dirOrder){
  const d=DIRS[dir],ex=x+d.dx,ey=y+d.dy;
  if(fromTile.opens[dir]&&!getTile(ex,ey)){
   exitKey=key(ex,ey);
   state.tiles[exitKey]={kind:'exit',opens:{...TILE_BASE.exit},rot:0,visited:false,monster:{name:'Red Dragon',dice:4,mod:0,maxHealth:20,health:20,glyph:'🐉',revealed:true,isDragon:true}};
   placed=true;break;
  }
 }
 if(!placed){
  for(const dir of dirOrder){
   const d=DIRS[dir],ex=x+d.dx,ey=y+d.dy;
   if(!getTile(ex,ey)){
    exitKey=key(ex,ey);
    state.tiles[exitKey]={kind:'exit',opens:{...TILE_BASE.exit},rot:0,visited:false,monster:{name:'Red Dragon',dice:4,mod:0,maxHealth:20,health:20,glyph:'🐉',revealed:true,isDragon:true}};
    break;
   }
  }
 }
 // Board-game Ring system: when the Exit appears, roll 2 dice and place the Ring on the matching M2-M12 floor tile.
 const rr=roll(2);
 const ringNumber=rr.total;
 const found=Object.entries(state.tiles).find(([kk,t])=>t.mNumber===ringNumber);
 state.ringActivated=true;
 state.ringNumber=ringNumber;
 state.ringRoll=[...rr.rolls];
 state.ringKey=found?found[0]:null;
 if(found)found[1].hasRing=true;
 playSound('dragon');
 playSound('dice');
 log('The final dungeon tile is laid. The Exit appears and the Red Dragon guards it.','loot');
 log('Ring location roll: '+rr.rolls.join(' + ')+' = '+ringNumber+'. The Ring of Creation appears on M'+ringNumber+'.','loot');
 if(found){
  const ringTile=found[1];
  if(ringTile.monsterPending || (ringTile.monster&&ringTile.monster.health>0)){
   log('A monster still occupies M'+ringNumber+'. It must be dealt with before the Ring can be collected.','combat');
  }
  collectRingIfSafe(found[0]);
 }else{
  log('Error: M'+ringNumber+' could not be found in the laid dungeon.','combat');
 }
}
function collectRingIfSafe(tileKey){
 if(!state.ringActivated||state.player.hasRing||state.ringKey!==tileKey)return false;
 const t=state.tiles[tileKey];
 if(!t||!t.hasRing)return false;
 const livingMonster=t.monsterPending||(t.monster&&t.monster.health>0);
 if(livingMonster)return false;
 t.hasRing=false;
 state.player.hasRing=true;
 playSound('ring');
 log('You pick up the Ring of Creation from M'+state.ringNumber+'!','loot');
 toast('You found the Ring of Creation!');
 return true;
}
function canMove(dir){const p=state.player,t=getTile(p.x,p.y),d=DIRS[dir],nt=getTile(p.x+d.dx,p.y+d.dy);return t&&t.opens[dir]&&nt&&nt.opens[d.opp];}
function canLay(dir){const p=state.player,t=getTile(p.x,p.y),d=DIRS[dir];return t&&t.opens[dir]&&!getTile(p.x+d.dx,p.y+d.dy)&&state.tileDeck.length>0;}

function move(dir){const p=state.player;if(p.ap<1)return;const d=DIRS[dir];p.prevX=p.x;p.prevY=p.y;p.x+=d.dx;p.y+=d.dy;p.ap-=1;sndMove();const t=getTile(p.x,p.y);t.visited=true;
 if(t.kind==='spike'){promptOldSpikey(t);render();centreOnHero(false);return;}
 if(t.kind==='pool'&&!t.poolUsed){promptHealingPool(t);}
 if(t.itemPending&&!t.itemUsed){t.itemUsed=true;t.itemPending=false;awardItem(drawItem());}
 if(t.droppedItems&&t.droppedItems.length){setTimeout(()=>offerDroppedItems(),80);}
 if(t.monsterPending&&!t.monster){t.monster=drawMonster();t.monsterPending=false;sndMonster();log('A monster is revealed: '+t.monster.name+'.','combat');}
 if(t.monster&&t.monster.health>0){t.monster.revealed=true;if(p.equipment.cloak&&t.kind!=='exit'&&!t.monster.isDragon){showCloakChoice(t);render();return;}openCombat(t);}
 else {collectRingIfSafe(key(p.x,p.y));}
 if(t.kind==='exit'&&p.hasRing&&!t.monster){win();}
 render();centreOnHero(false);}
function showCloakChoice(tile){const m=tile.monster;showModal('Invisibility Cloak',m.name+'\nHealth '+m.health+'/'+m.maxHealth+'\nCombat '+m.dice+'d6+'+m.mod+'\n\nYour cloak allows you to pass without fighting. The Dragon would still see you.',[{text:'Pass',cls:'green',fn:()=>{closeModal();log('You pass the '+m.name+' unseen.','system');render();}},{text:'Fight',cls:'red',fn:()=>{closeModal();openCombat(tile);}}]);}
function promptOldSpikey(tile){
 const carried=allCarriedItems().filter(x=>!isBear(x));
 const buttons=[];
 if(carried.length)buttons.push({text:'Destroy an Item',cls:'red',fn:()=>chooseSpikeSacrifice(tile)});
 buttons.push({text:'Roll the Dice',cls:'green',fn:()=>{closeModal();const trigger=roll(1).total;if(trigger<=2){const dmg=roll(1).total;state.player.health-=dmg;playSound('trap');log('Old Spikey rolls '+trigger+' and springs! You take '+dmg+' direct damage.','combat');if(state.player.health<=0)death();}else log('Old Spikey rolls '+trigger+'. You cross safely.','system');render();}});
 showModal('Old Spikey','Destroy one carried item to jam the mechanism, or roll a die. On 1–2 the trap springs and deals one die of direct damage.',buttons);
}
function chooseSpikeSacrifice(tile){const items=allCarriedItems().filter(x=>!isBear(x));showModal('Jam Old Spikey','Choose an item to destroy.',items.map(it=>({text:it.name,cls:'red',fn:()=>{dropDestroyedItem(it);closeModal();log('Destroyed '+it.name+' to jam Old Spikey.','system');render();}})).concat([{text:'Back',fn:()=>promptOldSpikey(tile)}]));}
function dropDestroyedItem(item){const p=state.player;if(item.name==='Magic Boots'&&p.flags.bootsBonus){p.flags.bootsBonus=false;p.maxAp=Math.max(1,p.maxAp-1);p.ap=Math.min(p.ap,p.maxAp);}removeFromCurrentLocation(item);state.itemDiscard.push(item);syncEquipment();}
function promptHealingPool(tile){
 showModal('Healing Pool','Use the Healing Pool and restore your Health to full? The pool can only be used once.'+(tile.droppedItems&&tile.droppedItems.length?'\n\nItems belonging to a fallen adventurer lie here and may be recovered.':''),[
  {text:'Yes — Heal',cls:'green',fn:()=>{closeModal();state.player.health=state.player.maxHealth;tile.poolUsed=true;sndItem();log('You use the Healing Pool and restore your health to full.','heal');render();}},
  {text:'No — Leave It',fn:()=>{closeModal();log('You leave the Healing Pool unused.','system');render();}}
 ]);
}
function openCombat(tile){const m=tile.monster;const bow=state.player.equipment.bow;const canOpeningBow=!!(bow&&!m.isDragon&&state.player.ap>=3);combat={tile,openingShot:!canOpeningBow,monsterSkip:false,reroll:false,rolling:false,mustFightRound:false};document.getElementById('combat').classList.add('open');document.getElementById('combatTitle').textContent='Combat';document.getElementById('combatLog').textContent='Ready to fight!';const tray=document.getElementById('diceTray');if(tray){tray.className='diceTray';tray.innerHTML='Dice will appear here.';}renderCombat();if(canOpeningBow){promptBow();}}
function promptBow(){const bow=state.player.equipment.bow;if(!bow||!combat)return;const bonus=bow.name==='Elven Bow'?2:0;const damageText=bonus?'1 die +2 damage':'1 die damage';showModal(bow.name,'Use your opening ranged attack? This costs 3 AP and deals '+damageText+'. If the monster survives, it charges into melee and you must fight one round before you can escape.',[{text:'Use '+bow.name,cls:'green',fn:()=>{closeModal();if(state.player.ap<3){toast('Not enough AP for '+bow.name);combat.openingShot=true;renderCombat();return;}state.player.ap-=3;playSound('bow');const die=roll(1).total;const dmg=die+bonus;setTimeout(()=>playSound('arrowHit'),120);combat.tile.monster.health-=dmg;combat.openingShot=true;combat.mustFightRound=combat.tile.monster.health>0;document.getElementById('combatLog').textContent=bow.name+' rolls '+die+(bonus?' +2':'')+' = '+dmg+' damage. '+(combat.tile.monster.health>0?'The monster charges! You must fight one melee round.':'The monster falls!');log(bow.name+' opening shot deals '+dmg+' damage.','combat');if(combat.tile.monster.health<=0){killMonster();return;}renderCombat();render();}},{text:'No',fn:()=>{closeModal();combat.openingShot=true;combat.mustFightRound=false;document.getElementById('combatLog').textContent='You hold your bow fire. Ready to fight!';log('You hold your bow fire and prepare for melee.','combat');renderCombat();}}]);}
function renderCombat(){if(!combat)return;const p=state.player,m=combat.tile.monster;document.getElementById('heroCombatStats').innerHTML='<div class="hearts">'+heartLine(p.health,p.maxHealth)+'</div><div>HP '+p.health+'/'+p.maxHealth+'</div><div>Combat '+pDice()+'d6+'+pCombatMod()+'</div><div>Damage reduction -'+pDamageReduction()+'</div><div>AP '+p.ap+'/'+p.maxAp+'</div>';document.getElementById('monsterGlyph').innerHTML=iconHTML(m.name,m.glyph||'👹');document.getElementById('monsterName').textContent=m.name;document.getElementById('monsterCombatStats').innerHTML='<div style="font-size:22px;font-weight:bold;color:var(--red)">HP '+m.health+' / '+m.maxHealth+'</div><div class="small">Monster Health: '+m.health+' of '+m.maxHealth+'</div><div>Combat '+m.dice+'d6+'+m.mod+'</div><div class="small">Monsters never score critical hits.</div><div class="small">'+(m.special||'')+'</div>';const b=document.getElementById('combatBtns');b.innerHTML='';addBtn(b,combat.rolling?'Rolling...':'Fight','green',fightRound,combat.rolling);addBtn(b,combat.mustFightRound?'Run (fight first)':'Run (-1 HP)','red',runAway,combat.mustFightRound);combatItemButtons(b);}
function combatItemButtons(wrap){const p=state.player;if(p.equipment.staff)addBtn(wrap,'❄ Ice Staff (4 AP)','blue',()=>useItem({use:'iceStaff',name:'Ice Staff'}),p.ap<4);allCarriedItems().forEach((it,idx)=>{if((it.type==='spell'||it.type==='consumable'||it.use)&&it.use!=='teleport')addBtn(wrap,(it.icon||'?')+' '+it.name,'gold',()=>useInventoryIndex(idx));});}

function diceHTML(label,rolls){return '<div class="diceGroup"><span class="diceLabel">'+label+'</span>'+rolls.map(v=>'<span class="die">'+v+'</span>').join('')+'</div>';}
function showDice(playerRolls,monsterRolls,rolling=false){const tray=document.getElementById('diceTray');if(!tray)return;tray.className='diceTray'+(rolling?' rolling':'');tray.innerHTML=diceHTML('You',playerRolls)+diceHTML('Monster',monsterRolls);}
function isCritical(rolls){return rolls.length>1 && rolls.every(v=>v===rolls[0]);}
function fightRound(){
 if(!combat||combat.rolling)return;
 const p=state.player,m=combat.tile.monster;
 m.meleeStarted=true;
 combat.rolling=true;
 showDice(Array.from({length:pDice()},()=>'?'),Array.from({length:m.dice},()=>'?'),true);
 document.getElementById('combatLog').textContent='Rolling dice...';
 playSound('dice');
 renderCombat();
 setTimeout(()=>resolveFightRound(),420);
}
function resolveFightRound(){
 if(!combat)return;
 const p=state.player,m=combat.tile.monster;
 let pr=roll(pDice()),mr=roll(m.dice);
 let crit=isCritical(pr.rolls);
 let diceScore=pr.total;
 let pt=(crit?diceScore*2:diceScore)+pCombatMod();
 let mt=mr.total+m.mod;
 if(p.flags.reroll){
   p.flags.reroll=false;
   pr=roll(pDice());
   crit=isCritical(pr.rolls);
   diceScore=pr.total;
   pt=(crit?diceScore*2:diceScore)+pCombatMod();
   log("Imp's Teeth reroll used.",'loot');
 }
 showDice(pr.rolls,mr.rolls,false);
 let text='You rolled '+pr.rolls.join(', ')+' = '+pr.total+(crit?' — CRITICAL! dice score doubled to '+(pr.total*2):'')+' + '+pCombatMod()+' = '+pt+'. Monster rolled '+mr.rolls.join(', ')+' = '+mr.total+' + '+m.mod+' = '+mt+'. ';
 const deadeye=p.special==='Dead-eye'&&pr.rolls.includes(6);
 if(deadeye){m.health=0;text+='Dead-eye! Instant kill.';}
 else if(pt>mt){let dmg=pt-mt;if(m.isDragon&&p.equipment.dragonlance){const extra=roll(3).total;dmg+=extra;text+='Dragonlance adds '+extra+' damage. ';}m.health-=dmg;text+='You hit for '+dmg+'.';}
 else if(mt>pt){if(combat.monsterSkip){combat.monsterSkip=false;text+=m.name+' is held and misses.';}else{let dmg=Math.max(0,mt-pt-pDamageReduction());p.health-=dmg;text+=m.name+' hits for '+dmg+'.';if(dmg>0&&p.equipment.bear){text+=' Loyal Bear is defeated protecting you.';delete p.equipment.bear;}}}
 else{text+='Both miss.';}
 combat.rolling=false;
 combat.mustFightRound=false;
 document.getElementById('combatLog').textContent=text;
 log(text,'combat');
 if(crit)playSound('critical');
 else if(pt!==mt)playSound('hit');
 if(m.health<=0){log('KILLING BLOW: your total of '+pt+' defeats the '+m.name+' (monster total '+mt+').','combat');killMonster();return;}
 if(p.health<=0){playSound('heroHurt');log('FATAL BLOW: '+m.name+' scores '+mt+' against your '+pt+' and defeats you.','combat');death();return;}
 if(mt>pt)playSound('heroHurt');
 render();renderCombat();
}
function killMonster(){const m=combat.tile.monster;const tileKey=key(state.player.x,state.player.y);playSound('monsterDie');log('Defeated '+m.name+'.','combat');state.player.killed.push(m.name);state.monsterDiscard.push(m);combat.tile.monster=null;if(!m.isDragon){collectRingIfSafe(tileKey);}if(m.isDragon&&state.player.hasRing){win();return;}if(!m.isDragon){const startingHealth=m.maxHealth;const rewardCount=startingHealth>=10?2:(startingHealth>=6?1:0);if(rewardCount===0){log(m.name+' had '+startingHealth+' starting Health: no item reward.','system');}else{log(m.name+' had '+startingHealth+' starting Health: draw '+rewardCount+' item'+(rewardCount===1?'':'s')+'.','loot');for(let i=0;i<rewardCount;i++)awardItem();}}closeCombat();render();}
function runAway(){const p=state.player;p.health-=1;playSound('run');log('Escaped combat: take 1 direct damage and return to the previous tile.','combat');if(p.health<=0){death();return;}p.x=p.prevX;p.y=p.prevY;if(combat?.tile?.monster){combat.tile.monster.revealed=true;}closeCombat();render();centreOnHero(false);}

function clearPlayerItems(){const p=state.player;p.slots={left:null,right:null,armour:null,boots:null};p.backpack=[];p.companionBear=null;p.flags.bootsBonus=false;p.maxAp=state.charDef.maxAp;p.ap=Math.min(p.ap,p.maxAp);syncEquipment();}
function healingPoolTile(){return Object.values(state.tiles).find(t=>t.kind==='pool')||null;}
function death(){const p=state.player;const carried=allCarriedItems();const acme=carried.find(it=>it.name==='Acme Insurance');if(p.flags.insurance||acme){if(acme){removeFromCurrentLocation(acme);state.itemDiscard.push(acme);}p.flags.insurance=false;p.health=p.maxHealth;p.x=0;p.y=0;log('Acme Insurance saves you and lets you keep your items!','heal');closeCombat();render();centreOnHero();return;}const killedByDragon=!!(combat&&combat.tile&&combat.tile.monster&&combat.tile.monster.isDragon);const droppable=carried.filter(it=>!isBear(it));if(droppable.length){let targetTile;if(killedByDragon){targetTile=healingPoolTile();if(targetTile){log('The Dragon defeats you. Your items are transferred to the Healing Pool.','combat');}else{targetTile=getTile(p.x,p.y);log('The Dragon defeats you. No Healing Pool is available, so your items remain at the Exit.','combat');}}else{targetTile=getTile(p.x,p.y);log('Your items drop on the tile where you fell.','combat');}if(targetTile){targetTile.droppedItems=targetTile.droppedItems||[];targetTile.droppedItems.push(...droppable);}clearPlayerItems();}p.lives--;if(p.lives<=0){lose();return;}p.health=p.maxHealth;p.x=0;p.y=0;p.hasRing=false;log('You fall and wake at Start. Lives left: '+p.lives+'.','combat');closeCombat();render();centreOnHero();}
function closeCombat(){document.getElementById('combat').classList.remove('open');combat=null;if(state?.player)state.player.temp={};}
function useInventoryItem(list,idx){ /* legacy alias */ if(list==='inventory')useInventoryIndex(idx); }
function useItem(it,consume){const p=state.player,m=combat?.tile?.monster;let used=false,msg='';
 if(it.use==='healthPotion'){const h=roll(2).total;p.health=Math.min(p.maxHealth,p.health+h);msg='Health Potion restores '+h+' health.';used=true;}
 if(it.use==='strengthPotion'){p.temp.strength=true;msg='Strength Potion: +1 combat die for this fight.';used=true;}
 if(it.use==='reroll'){p.flags.reroll=true;msg="Imp's Teeth ready: your next combat roll rerolls.";used=true;}
 if(it.use==='iceStaff'&&m&&p.ap>=4){p.ap-=4;const dmg=roll(2).total;m.health-=dmg;msg='Ice Staff deals '+dmg+' damage.';used=false;}
 if(['fireball','bomb','daggers','skull','vine','vampire','claw'].includes(it.use)&&m){let dmg=0,cost=0;if(it.use==='fireball'){dmg=roll(3).total;cost=2;}if(it.use==='bomb'){dmg=roll(2).total;cost=1;}if(it.use==='daggers'){dmg=roll(2).total;cost=2;}if(it.use==='skull'){dmg=roll(1).total;}if(it.use==='vine'){dmg=roll(1).total;cost=1;combat.monsterSkip=true;}if(it.use==='vampire'){dmg=5;p.health=Math.min(p.maxHealth,p.health+5);}if(it.use==='claw'){m.mod=Math.max(0,m.mod-2);dmg=0;}if(p.ap<cost){toast('Not enough AP');return;}p.ap-=cost;m.health-=dmg;msg=it.name+' used. '+(dmg?m.name+' takes '+dmg+' damage.':'Monster weakened.');used=true;}
 if(it.use==='tornado'&&combat){msg='Tornado carries you away.';used=true;consume?.();document.getElementById('combatLog').textContent=msg;runAway();return;}
 if(it.use==='smallChest'){const r=roll(1).total;if(r<=2){p.health-=2;msg='Chest trap! Take 2 damage.';}else{awardItem();msg='Small Chest opened: draw 1 item.';}used=true;}
 if(it.use==='largeChest'){const r=roll(1).total;if(r<=2){p.health-=5;msg='Large Chest trap! Take 5 damage.';}else{awardItem();awardItem();msg='Large Chest opened: draw 2 items.';}used=true;}
 if(it.use==='teleport'){showTeleport();used=false;}
 if(msg){if(it.use==='fireball')playSound('fireball');else if(it.name==='Ice Staff')playSound('ice');else if(it.use==='healthPotion')playSound('heal');else if(it.use==='teleport')playSound('teleport');else sndSpell();log(msg,it.use==='healthPotion'?'heal':'loot');toast(msg);} if(used&&consume)consume(); if(m&&m.health<=0){killMonster();return;} if(p.health<=0){death();return;}render();if(combat)renderCombat();}
function showTeleport(){const p=state.player;showModal('Teleport Crystal','Click any revealed tile on the map to teleport. Crystal is one use; for now choose Centre then a map tile is not required in this test build.',[{text:'Teleport to Start',cls:'green',fn:()=>{p.x=0;p.y=0;const crystal=allCarriedItems().find(it=>it.name==='Teleport Crystal');if(crystal){removeFromCurrentLocation(crystal);state.itemDiscard.push(crystal);}closeModal();render();centreOnHero();log('Teleported to Start.','system');}},{text:'Cancel',fn:closeModal}]);}
function removeNamed(arr,name){const i=arr.findIndex(x=>x.name===name);if(i>=0)arr.splice(i,1);}
function endTurn(){const p=state.player;state.turns=(state.turns||1)+1;p.ap=p.maxAp;Object.values(state.tiles).forEach(t=>{if(t.monster&&t.monster.health>0)t.monster.health=t.monster.maxHealth;});log('Turn ends. AP restored. Surviving monsters heal to full.','system');render();}
function heartLine(h,m){const n=Math.max(0,Math.ceil((h/m)*10));return '♥'.repeat(n)+'♡'.repeat(10-n)}
function addBtn(w,text,cls,fn,disabled=false){const b=document.createElement('button');b.textContent=text;if(cls)b.className=cls;b.disabled=disabled;b.onclick=fn;w.appendChild(b);return b;}

function openMenu(){
  const devLabel = devOpen ? 'Hide Developer' : 'Developer Mode';
  showModal('Menu','Save/load, graphics and custom sounds use this browser only while testing.',[
    {text:'Resume',fn:closeModal},
    {text:'Save Game',cls:'green',fn:()=>{saveGame();closeModal();}},
    {text:'Load Game',fn:()=>{loadGame();closeModal();}},
    {text:'Asset Manager',fn:()=>{closeModal();openAssetManager();}},
    {text:'Sound Manager',fn:()=>{closeModal();openSoundManager();}},
    {text:devLabel,fn:()=>{toggleDev();closeModal();}},
    {text:'New Game',cls:'red',fn:()=>{closeModal();if(confirm('Start a new dungeon?'))showCharSelect();}}
  ]);
}

function showModal(title,body,buttons){document.getElementById('modalTitle').textContent=title;document.getElementById('modalBody').textContent=body;const mb=document.getElementById('modalButtons');mb.innerHTML='';buttons.forEach(x=>addBtn(mb,x.text,x.cls,x.fn));document.getElementById('modal').classList.add('open');}
function closeModal(){document.getElementById('modal').classList.remove('open');}
function toast(t){const el=document.getElementById('toast');el.textContent=t;el.style.display='block';clearTimeout(el._t);el._t=setTimeout(()=>el.style.display='none',1500)}
function log(msg,cls){const d=document.createElement('div');d.className='logline '+(cls||'');d.textContent=msg;document.getElementById('log').appendChild(d);document.getElementById('log').scrollTop=99999;}
function tileAssetName(kind){return TILE_LABEL[kind]||kind}
function tileSVG(tile){
 const floorKeys=['Straight','Corner','T-Junction','Crossroad','Spike Trap','Healing Pool','Exit','Start'];
 const name=tileAssetName(tile.kind);
 const userSrc=USER_ASSETS[assetKey(name)];
 const src=floorKeys.includes(name)?userSrc:assetSrc(name);
 if(src){
   const deg=(tile.rot||0)*90;
   return `<img class="tileAsset" src="${src}" alt="${name}" style="transform:rotate(${deg}deg)">`;
 }
 const o=tile.opens,w=14,c=32;let path='';
 if(o.N)path+=`<rect x="${c-w}" y="0" width="${w*2}" height="${c+w}"/>`;
 if(o.S)path+=`<rect x="${c-w}" y="${c-w}" width="${w*2}" height="${c+w}"/>`;
 if(o.E)path+=`<rect x="${c-w}" y="${c-w}" width="${c+w}" height="${w*2}"/>`;
 if(o.W)path+=`<rect x="0" y="${c-w}" width="${c+w}" height="${w*2}"/>`;
 path+=`<rect x="${c-w-3}" y="${c-w-3}" width="${(w+3)*2}" height="${(w+3)*2}"/>`;
 return `<svg viewBox="0 0 64 64"><rect x="0" y="0" width="64" height="64" fill="var(--cream)"/><g fill="var(--ink)">${path}</g></svg>`;
}
function render(){if(!state)return;document.getElementById('stats').innerHTML=`<div class="sectionTitle">${state.charDef?state.charDef.name:'Adventurer'}</div><div class="row"><span>Health</span><b class="hp">${state.player.health}/${state.player.maxHealth}</b></div><div class="hearts">${heartLine(state.player.health,state.player.maxHealth)}</div><div class="row"><span>AP</span><b class="ap">${state.player.ap}/${state.player.maxAp}</b></div><div class="statline">Combat: ${pDice()}d6+${pCombatMod()} &nbsp; Armour: -${pDamageReduction()}</div><div class="statline">Lives: ${state.player.lives} &nbsp; Ring: ${state.player.hasRing?'YES':'no'}</div>`;renderInventory();renderKillTally();renderWorld();renderControls();renderDev();document.getElementById('deckBadge').textContent='Tiles '+state.tileDeck.length;document.getElementById('monsterBadge').textContent='Monsters '+state.monsterDeck.length;document.getElementById('itemBadge').textContent='Items '+state.itemDeck.length;}

function slotHTML(label,item,slot){return `<div class="equipSlot"><span class="slotLabel">${label}</span>${item?`<div class="slotItem" onclick="inspectCarried('${slot}')">${iconHTML(item.name,item.icon||'?')}<br>${item.name}${isTwoHanded(item)?'<br><span class="twoHandedBadge">TWO-HANDED</span>':''}</div>`:'<div class="slotEmpty">Empty</div>'}</div>`;}
function renderInventory(){const p=state.player,el=document.getElementById('inventory');const left=p.slots.left,right=p.slots.right;let html=`<div class="sectionTitle">Inventory ${occupiedSpaceCount()}/8</div><div class="small">Equipment is active only while placed in the correct slot.</div><div class="slotGrid">${slotHTML('Left Hand',left,'left')}${slotHTML('Right Hand',right,'right')}${slotHTML('Armour',p.slots.armour,'armour')}${slotHTML('Boots',p.slots.boots,'boots')}</div><div class="sectionTitle">Backpack ${p.backpack.length}/4</div><div class="backpackGrid">`;
 for(let i=0;i<BACKPACK_LIMIT;i++){const it=p.backpack[i];html+=`<div class="backpackSlot">${it?`<div class="slotItem" onclick="inspectBackpack(${i})">${iconHTML(it.name,it.icon||'?')}<br>${it.name}</div>`:'<div class="slotEmpty">Empty</div>'}</div>`;}html+='</div>';
 if(p.companionBear)html+=`<div class="sectionTitle">Companion</div><button class="itemBtn equipped" onclick="inspectBear()">${iconHTML('Loyal Bear',p.companionBear.icon||'🐻')}</button> <span class="small">Loyal Bear (no space)</span>`;
 const t=getTile(p.x,p.y);if(t&&t.droppedItems&&t.droppedItems.length)html+='<div class="sectionTitle">On this tile</div><div class="invgrid">'+t.droppedItems.map((x,i)=>`<button class="itemBtn" onclick="pickupDropped(${i})" title="Pick up ${x.name}">${iconHTML(x.name,x.icon||'?')}<span class="dropMark">+</span></button>`).join('')+'</div>';
 if(p.equipment.weapon&&p.equipment.weapon.name==='Magic Sword')html+=magicSwordPeekHTML();el.innerHTML=html;}
function magicSwordPeekHTML(){const p=state.player;let rows=[];for(const dir of dirOrder){const d=DIRS[dir],t=getTile(p.x+d.dx,p.y+d.dy);if(t&&(t.monsterPending||(t.monster&&!t.monster.revealed)))rows.push(`<button class="peekBtn" onclick="peekMonster('${dir}')">View ${dir}</button>`);}return rows.length?'<div class="sectionTitle">Magic Sword</div><div class="small">View adjacent monster:</div>'+rows.join(' '):'';}
window.peekMonster=function(dir){const p=state.player,d=DIRS[dir],t=getTile(p.x+d.dx,p.y+d.dy);if(!t)return;if(t.monsterPending&&!t.monster){t.monster=drawMonster();t.monsterPending=false;}if(t.monster){t.monster.peeked=true;showModal('Magic Sword: '+dir,t.monster.name+'\nHealth '+t.monster.maxHealth+'\nCombat '+t.monster.dice+'d6+'+t.monster.mod,[{text:'Close',fn:closeModal}]);render();}};
function carriedAt(slot){return state.player.slots[slot];}
window.inspectCarried=function(slot){const item=carriedAt(slot);if(item)inspectItemObject(item);};window.inspectBackpack=function(idx){const item=state.player.backpack[idx];if(item)inspectItemObject(item);};window.inspectBear=function(){if(state.player.companionBear)inspectItemObject(state.player.companionBear);};
function inspectItemObject(item){const buttons=[];const eq=equippedSlotFor(item);if(item.type==='equipment'||isHandItem(item)||isArmour(item)||isBoots(item)){if(eq&&eq!=='companion')buttons.push({text:'Move to Backpack',fn:()=>{if(unequipItem(item)){closeModal();render();}}});if(isArmour(item)&&eq!=='armour')buttons.push({text:'Wear Armour',cls:'green',fn:()=>{if(equipToSlot(item,'armour')){closeModal();render();}}});else if(isBoots(item)&&eq!=='boots')buttons.push({text:'Wear Boots',cls:'green',fn:()=>{if(equipToSlot(item,'boots')){closeModal();render();}}});else if(isHandItem(item)&&eq!=='both hands'){buttons.push({text:isTwoHanded(item)?'Equip Both Hands':'Equip Left Hand',cls:'green',fn:()=>{if(equipToSlot(item,'left')){closeModal();render();}}});if(!isTwoHanded(item))buttons.push({text:'Equip Right Hand',cls:'green',fn:()=>{if(equipToSlot(item,'right')){closeModal();render();}}});}}
 if(item.type==='spell'||item.type==='consumable'||item.use)buttons.push({text:'Use',cls:'green',fn:()=>{closeModal();useItemObject(item);}});buttons.push({text:'Drop',cls:'red',fn:()=>dropItemObject(item)});buttons.push({text:'Close',fn:closeModal});showModal(item.name,(item.desc||'Item')+(eq?'\n\nActive: '+eq:''),buttons);}
function useItemObject(item){useItem(item,()=>{removeFromCurrentLocation(item);state.itemDiscard.push(item);syncEquipment();render();});}
function useInventoryIndex(idx){const item=allCarriedItems()[idx];if(item)useItemObject(item);}

function renderKillTally(){const el=document.getElementById('killTally');if(!el||!state)return;const counts={};state.player.killed.forEach(n=>counts[n]=(counts[n]||0)+1);const names=Object.keys(counts);el.innerHTML='<div class="sectionTitle">Monster Tally</div>'+(names.length?'<div class="killGrid">'+names.map(n=>'<span>'+n+'</span><b>×'+counts[n]+'</b>').join('')+'</div>':'<div class="small">No monsters defeated yet.</div>')+'<div class="killTotal">Total kills: '+state.player.killed.length+'</div>';}
function renderWorld(){const world=document.getElementById('world');world.innerHTML='';for(const k in state.tiles){const [x,y]=k.split(',').map(Number),t=state.tiles[k];const d=document.createElement('div');d.className='tile';d.style.left=(x*STEP)+'px';d.style.top=(y*STEP)+'px';d.innerHTML=tileSVG(t);if(TILE_GLYPH[t.kind])d.innerHTML+=`<span class="mark">${iconHTML(TILE_LABEL[t.kind]||t.kind,TILE_GLYPH[t.kind])}</span>`;if(t.mNumber)d.innerHTML+=`<span class="mNumber">M${t.mNumber}</span>`;if(t.hasRing)d.innerHTML+=`<span class="ringMark">${iconHTML('Ring','💍')}</span>`;if(t.itemPending&&!t.itemUsed)d.innerHTML+='<span class="tiny">Item</span>';if(t.droppedItems&&t.droppedItems.length)d.innerHTML+='<span class="dropMark">$</span>';if((t.monsterPending)||(t.monster&&t.monster.health>0)){d.innerHTML+=(t.monster&&(t.monster.revealed||t.monster.peeked))?`<span class="mark monsterGlyph">${iconHTML(t.monster.name,t.monster.glyph)}</span>`:`<span class="mark hiddenMonster">M</span>`;}world.appendChild(d);}const h=document.createElement('div');h.className='hero';h.innerHTML=state.charDef?iconHTML(state.charDef.name,state.charDef.glyph):iconHTML('Hero','🧑');const heroSize=62;const heroOffset=(TILE-heroSize)/2;h.style.left=(state.player.x*STEP+heroOffset)+'px';h.style.top=(state.player.y*STEP+heroOffset)+'px';world.appendChild(h);applyPan();}
function renderControls(){const wrap=document.getElementById('controls');wrap.innerHTML='';if(state.gameOver)return;['N','E','S','W'].forEach(dir=>{if(canMove(dir))addBtn(wrap,'Move '+dir,'green',()=>move(dir),state.player.ap<1);else if(canLay(dir))addBtn(wrap,'Lay '+dir,'gold',()=>startPlace(dir),state.player.ap<1);});addBtn(wrap,'End Turn','blue',endTurn);}
function applyPan(){document.getElementById('world').style.transform=`translate(${pan.x}px,${pan.y}px) scale(${pan.scale})`;}
function openingScale(){
  const rect=document.getElementById('viewport').getBoundingClientRect();
  const mobile=window.matchMedia('(max-width: 800px)').matches;
  const target=mobile ? rect.width*0.68 : Math.min(rect.width*0.30, 230);
  return Math.max(0.55,Math.min(mobile?2.1:1.45,target/TILE));
}
function setOpeningCamera(){pan.scale=openingScale();centreOnHero(false);}
function centreOnHero(smooth=true){
  if(!state||!state.player)return;
  const rect=document.getElementById('viewport').getBoundingClientRect();
  const world=document.getElementById('world');
  world.classList.toggle('cameraSmooth',!!smooth);
  pan.x=rect.width/2-(state.player.x*STEP+TILE/2)*pan.scale;
  pan.y=rect.height/2-(state.player.y*STEP+TILE/2)*pan.scale;
  applyPan();
  if(smooth)setTimeout(()=>world.classList.remove('cameraSmooth'),320);
}
function zoomAt(clientX,clientY,newScale){
  const rect=vp.getBoundingClientRect();
  const px=clientX-rect.left,py=clientY-rect.top;
  const wx=(px-pan.x)/pan.scale,wy=(py-pan.y)/pan.scale;
  pan.scale=Math.max(.45,Math.min(2.6,newScale));
  pan.x=px-wx*pan.scale;pan.y=py-wy*pan.scale;applyPan();
}
const vp=document.getElementById('viewport');
const activePointers=new Map();
let dragOrigin=null,pinchStart=null,lastTap=0;
vp.addEventListener('pointerdown',e=>{
  activePointers.set(e.pointerId,{x:e.clientX,y:e.clientY});
  vp.setPointerCapture(e.pointerId);vp.classList.add('dragging');
  document.getElementById('world').classList.remove('cameraSmooth');
  if(activePointers.size===1){dragOrigin={x:e.clientX,y:e.clientY,panX:pan.x,panY:pan.y};pinchStart=null;}
  else if(activePointers.size===2){
    const pts=[...activePointers.values()];
    pinchStart={distance:Math.hypot(pts[1].x-pts[0].x,pts[1].y-pts[0].y),scale:pan.scale,midX:(pts[0].x+pts[1].x)/2,midY:(pts[0].y+pts[1].y)/2};
    dragOrigin=null;
  }
});
vp.addEventListener('pointermove',e=>{
  if(!activePointers.has(e.pointerId))return;
  activePointers.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(activePointers.size===2&&pinchStart){
    const pts=[...activePointers.values()];
    const dist=Math.hypot(pts[1].x-pts[0].x,pts[1].y-pts[0].y);
    const midX=(pts[0].x+pts[1].x)/2,midY=(pts[0].y+pts[1].y)/2;
    zoomAt(midX,midY,pinchStart.scale*(dist/Math.max(1,pinchStart.distance)));
  }else if(activePointers.size===1&&dragOrigin){
    pan.x=dragOrigin.panX+(e.clientX-dragOrigin.x);pan.y=dragOrigin.panY+(e.clientY-dragOrigin.y);applyPan();
  }
});
function endPointer(e){
  activePointers.delete(e.pointerId);
  if(activePointers.size===0){vp.classList.remove('dragging');dragOrigin=null;pinchStart=null;}
  else if(activePointers.size===1){const p=[...activePointers.values()][0];dragOrigin={x:p.x,y:p.y,panX:pan.x,panY:pan.y};pinchStart=null;}
}
vp.addEventListener('pointerup',endPointer);vp.addEventListener('pointercancel',endPointer);
vp.addEventListener('dblclick',e=>{e.preventDefault();centreOnHero(true);});
vp.addEventListener('touchend',e=>{if(e.touches.length)return;const now=Date.now();if(now-lastTap<320)centreOnHero(true);lastTap=now;},{passive:true});
vp.addEventListener('wheel',e=>{e.preventDefault();zoomAt(e.clientX,e.clientY,pan.scale*(e.deltaY<0?1.12:0.89));},{passive:false});
window.addEventListener('resize',()=>{if(state)centreOnHero(false);});
function migrateSave(){if(!state||!state.player)return;const p=state.player;p.slots=p.slots||{left:null,right:null,armour:null,boots:null};p.backpack=p.backpack||[];p.flags=p.flags||{};p.flags.bootsBonus=!!p.flags.bootsBonus;if(Array.isArray(p.inventory)&&!p.backpack.length){p.inventory.slice(0,4).forEach(x=>p.backpack.push(x));}p.companionBear=p.companionBear||null;p.inventory=[];syncEquipment();}


function saveGame(){
  try{localStorage.setItem('bodDigitalSaveV40',JSON.stringify({state,pan}));toast('Game saved.');}
  catch(e){alert('Could not save game: '+e.message);}
}
function loadGame(){
  try{const raw=localStorage.getItem('bodDigitalSaveV40') || localStorage.getItem('bodDigitalSaveV36') || localStorage.getItem('bodDigitalSaveV35');if(!raw){toast('No save found.');return;}const data=JSON.parse(raw);state=data.state;pan=data.pan||{x:0,y:0,scale:1};migrateSave();document.getElementById('charSelect').classList.add('hidden');render();centreOnHero(false);toast('Game loaded.');}
  catch(e){alert('Could not load game: '+e.message);}
}
function toggleDev(){devOpen=!devOpen;renderDev();}
function renderDev(){const el=document.getElementById('devPanel');if(!devOpen||!state){el.classList.remove('open');return;}el.classList.add('open');const p=state.player,t=getTile(p.x,p.y);el.textContent=`DEVELOPER ${VERSION}
Hero: ${state.charDef?.name||'-'}
Pos: ${p.x},${p.y}
Tile: ${t?.kind||'-'} rot ${t?.rot||0}
Open: ${t?Object.keys(t.opens).filter(d=>t.opens[d]).join(''):'-'}
AP: ${p.ap}/${p.maxAp}  HP: ${p.health}/${p.maxHealth}
Tiles deck: ${state.tileDeck.length}  laid: ${Object.keys(state.tiles).length}
Monster deck: ${state.monsterDeck.length}  discard: ${state.monsterDiscard?.length||0}
Item deck: ${state.itemDeck.length}  discard: ${state.itemDiscard?.length||0}
Exit placed: ${state.exitPlaced?'yes':'no'}
Ring carried: ${p.hasRing?'yes':'no'}  ring: ${state.ringNumber?'M'+state.ringNumber:'not rolled'}  tile: ${state.ringKey||'-'}
Inventory spaces: ${occupiedSpaceCount()}/8  Backpack: ${p.backpack.length}/4
Dropped here: ${t?.droppedItems?.length||0}
Kills: ${p.killed.length}
Turns: ${state.turns||1}`;}
function adventureStats(){const p=state.player;const mins=Math.max(0,Math.round((Date.now()-(state.startedAt||Date.now()))/60000));return `Turns: ${state.turns||1}\nTime: ${mins} mins\nKills: ${p.killed.length}\nItems left: ${state.itemDeck.length}\nMonster deck left: ${state.monsterDeck.length}`;}

document.getElementById('zoomIn').onclick=()=>{const r=vp.getBoundingClientRect();zoomAt(r.left+r.width/2,r.top+r.height/2,pan.scale*1.18)};document.getElementById('zoomOut').onclick=()=>{const r=vp.getBoundingClientRect();zoomAt(r.left+r.width/2,r.top+r.height/2,pan.scale/1.18)};document.getElementById('centreBtn').onclick=()=>centreOnHero();document.getElementById('menuBtn').onclick=openMenu;document.addEventListener('keydown',e=>{if(e.key==='F9'){e.preventDefault();toggleDev();}});
function win(){state.gameOver=true;sndWin();closeCombat();showModal('YOU ESCAPED!','You defeated the Dragon and escaped with the Ring of Creation.\n\n'+adventureStats(),[{text:'New Game',cls:'green',fn:()=>{showCharSelect();}}]);}
function lose(){state.gameOver=true;sndLose();closeCombat();showModal('GAME OVER','The dungeon claims another adventurer.\n\n'+adventureStats(),[{text:'New Game',cls:'green',fn:()=>{showCharSelect();}}]);}
renderCharSelect();
</script>
